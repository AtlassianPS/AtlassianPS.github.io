name: Docs hygiene

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "assets/**"
      - "_layouts/**"
      - "_includes/**"
      - ".github/workflows/docs-hygiene.yml"
  pull_request:
    branches: [master]
    paths:
      - "docs/**"
      - "assets/**"
      - "_layouts/**"
      - "_includes/**"
      - ".github/workflows/docs-hygiene.yml"

permissions:
  contents: read

jobs:
  content-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard against stale placeholder docs text
        run: |
          set -euo pipefail

          if grep -RInE "THIS PAGE IS IN WORK|This page describes:" docs; then
            echo "Found placeholder docs text. Please replace with real content."
            exit 1
          fi

          if grep -RInE 'git checkout develop|out of `develop`|merged into the `develop` branch' docs/Contributing; then
            echo "Found outdated branch guidance that still references develop."
            exit 1
          fi

  local-link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production

      - name: Check local docs links and anchors
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --root-dir _site '_site/**/*.html'
          fail: true
